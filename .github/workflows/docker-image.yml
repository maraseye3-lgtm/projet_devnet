name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Flask App
      uses: docker/build-push-action@v4
      with:
        context: ./app
        file: ./app/Dockerfile.app
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/netmon-app:latest
        
    - name: Build and push Monitor Service
      uses: docker/build-push-action@v4
      with:
        context: ./monitor
        file: ./monitor/Dockerfile.monitor
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/netmon-monitor:latest
