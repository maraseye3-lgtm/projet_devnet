name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Flask App
      uses: docker/build-push-action@v4
      with:
        context: ./app
        file: ./app/Dockerfile.app
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/netmon-app:latest
          ${{ secrets.DOCKER_USERNAME }}/netmon-app:${{ github.sha }}

    - name: Build and push Monitor Service
      uses: docker/build-push-action@v4
      with:
        context: ./monitor
        file: ./monitor/Dockerfile.monitor
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/netmon-monitor:latest
          ${{ secrets.DOCKER_USERNAME }}/netmon-monitor:${{ github.sha }}
