<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetMon - Authentification Sécurisée</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 1.5rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
            border: none;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: none;
            padding-bottom: 0;
        }

        .login-header h2 {
            font-size: 2rem;
            font-weight: 800;
            color: #1c1e21;
            margin: 0;
            letter-spacing: -0.025em;
        }

        .login-header p {
            color: #4b4f56;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .login-card form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: none;
        }

        .input-wrapper svg {
            display: none;
        }

        .login-card input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid #dddfe2;
            border-radius: 0.4rem;
            font-size: 1rem;
            background-color: white;
            transition: border-color 0.2s;
        }

        .login-card input:focus {
            border-color: #1877f2;
            box-shadow: none;
            background-color: white;
        }

        .login-card button {
            background-color: #1877f2;
            padding: 0.8rem;
            font-size: 1.25rem;
            font-weight: 700;
            border-radius: 0.4rem;
            margin-top: 0.5rem;
        }

        .login-card button:hover {
            background-color: #166fe5;
            transform: none;
        }

        .login-card input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background-color: white;
        }

        .login-card button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            filter: brightness(1.1);
        }

        .flash-messages {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background-color: #fef2f2;
            color: #991b1b;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            text-align: center;
            border: 1px solid #fee2e2;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .login-footer {
            margin-top: 2rem;
            padding: 1.25rem;
            background-color: #f1f5f9;
            border-radius: 1rem;
            font-size: 0.825rem;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .login-footer code {
            background: #e2e8f0;
            padding: 0.2rem 0.4rem;
            border-radius: 0.3rem;
            color: #0f172a;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <svg fill="none" stroke="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:32px;height:32px">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                </div>
                <h2>Bienvenue sur NetMon</h2>
                <p>Connectez-vous pour accéder au monitoring</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="flash-messages">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="username">Identifiant</label>
                    <div class="input-wrapper">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <input type="text" id="username" name="username" placeholder="Nom d'utilisateur" required autofocus>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-wrapper">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit">Se connecter au tableau de bord</button>
            </form>
        </div>
    </div>
</body>
</html>
